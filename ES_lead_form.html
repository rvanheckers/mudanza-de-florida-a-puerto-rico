                        </div>

        <script>
    document.addEventListener('DOMContentLoaded', function () {
        const steps = document.querySelectorAll('.form-step');
        const nextButtons = document.querySelectorAll('.next-step');
        const prevButtons = document.querySelectorAll('.prev-step');
        const wizardItems = document.querySelectorAll('.step-wizard-item');
        const progressBars = document.querySelectorAll('.progress-bar');

        let currentStep = 0;

        function showStep(step) {
            steps.forEach((element, index) => {
                if (index === step) {
                    element.classList.add('active');
                    wizardItems[index].classList.add('active');
                    if (index > 0) {
                        progressBars[index - 1].style.backgroundColor = '#007bff';
                    }
                } else {
                    element.classList.remove('active');
                    wizardItems[index].classList.remove('active');
                    if (index < step) {
                        progressBars[index].style.backgroundColor = '#007bff';
                    } else {
                        progressBars[index].style.backgroundColor = '#e9ecef';
                    }
                }
            });
        }

        nextButtons.forEach(button => {
            button.addEventListener('click', () => {
                if (currentStep < steps.length - 1) {
                    currentStep++;
                    showStep(currentStep);
                }
            });
        });

        prevButtons.forEach(button => {
            button.addEventListener('click', () => {
                if (currentStep > 0) {
                    currentStep--;
                    showStep(currentStep);
                }
            });
        });

        document.getElementById('multiStepForm').addEventListener('submit', function (event) {
            event.preventDefault(); // Evita la acción por defecto del formulario

            const form = event.target;
            const formData = new FormData(form);
            const jsonData = {};

            formData.forEach((value, key) => {
                jsonData[key] = value;
            });

            fetch(form.action, {
                method: form.method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(jsonData)
            })
            .then(response => {
                if (response.ok) {
                    window.location.href = 'https://intl-movers.net/thank-you#typ'; // Asegúrate de que la ruta sea correcta
                } else {
                    console.error('No se pudo enviar el formulario');
                }
            })
            .catch((error) => {
                console.error('Error:', error);
            });
        });
    });
    </script>
